<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Contact</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;margin:40px;background:#f7f7f7}
    .card{max-width:600px;margin:0 auto;background:#fff;padding:24px;border-radius:8px;box-shadow:0 4px 12px rgba(0,0,0,.06)}
    label{display:block;margin:12px 0 6px;font-weight:600}
    input,textarea{width:100%;padding:10px;border:1px solid #ddd;border-radius:4px}
    button{margin-top:12px;padding:10px 16px;border:0;background:#0078d4;color:#fff;border-radius:6px;cursor:pointer}
  </style>
</head>
<body>
  <div class="card">
    <h1>Contact Us</h1>
    <form action="#" method="post">
      <label for="name">Name</label>
      <input id="name" name="name" type="text" placeholder="Your name" required />

      <label for="email">Email</label>
      <input id="email" name="email" type="email" placeholder="you@example.com" required />

      <label for="message">Message</label>
      <textarea id="message" name="message" rows="6" placeholder="How can we help?" required></textarea>

      <button type="submit">Send</button>
    </form>
  </div>
</body>
</html>
